<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Configurações · PJe Sejud Cariri</title>
<style>
  :root { --bg:#f8fafc; --card:#fff; --fg:#0f172a; --muted:#64748b; --border:#e2e8f0; --accent:#1e3a5f; --accent2:#0f172a; --ok:#10b981; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--fg); min-height:100vh; padding:32px 16px; }
  .wrap { max-width:680px; margin:0 auto; display:flex; flex-direction:column; gap:20px; }
  .header { display:flex; align-items:center; gap:14px; padding:18px 22px; background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#fff; border-radius:14px; box-shadow:0 4px 16px rgba(15,23,42,.18); }
  .header img { width:42px; height:42px; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,.25); }
  .header .titles { display:flex; flex-direction:column; gap:3px; }
  .header h1 { font-size:19px; font-weight:700; line-height:1.1; }
  .header .sub { font-size:12px; opacity:.75; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px 22px; display:flex; flex-direction:column; gap:14px; }
  .card h2 { font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .card h2 .ico { color:var(--accent); }
  .card .desc { font-size:12.5px; color:var(--muted); line-height:1.5; }
  .fila-list { display:flex; flex-direction:column; gap:8px; }
  .fila-check { display:flex; align-items:flex-start; gap:10px; padding:9px 12px; border:1px solid var(--border); border-radius:8px; cursor:pointer; transition:all .12s; background:#fff; }
  .fila-check:hover { border-color:#cbd5e1; background:#f8fafc; }
  .fila-check.checked { border-color:var(--ok); background:#ecfdf5; }
  .fila-check input { margin-top:2px; accent-color:var(--ok); width:15px; height:15px; flex-shrink:0; cursor:pointer; }
  .fila-check .nome { font-size:12.5px; font-weight:500; color:var(--fg); line-height:1.35; word-break:break-word; }
  .fila-check.checked .nome { color:#065f46; font-weight:600; }
  textarea { width:100%; min-height:90px; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-family:'SF Mono',Consolas,monospace; font-size:12px; color:var(--fg); background:#fff; outline:none; resize:vertical; transition:border-color .15s,box-shadow .15s; line-height:1.5; }
  textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(30,58,95,.12); }
  .field-label { font-size:11.5px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:6px; display:block; }
  .actions { display:flex; gap:10px; align-items:center; }
  .btn-primary { padding:10px 22px; border:none; border-radius:8px; background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#fff; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(15,23,42,.25); }
  .btn-primary:active { transform:translateY(0); }
  .btn-ghost { padding:10px 18px; border:1px solid var(--border); border-radius:8px; background:#fff; color:var(--muted); font-family:inherit; font-size:12.5px; font-weight:500; cursor:pointer; transition:all .15s; }
  .btn-ghost:hover { background:#f8fafc; color:var(--fg); }
  .toast { font-size:12.5px; font-weight:600; color:var(--ok); opacity:0; transition:opacity .25s; }
  .toast.show { opacity:1; }
  .back { font-size:12px; color:var(--muted); text-decoration:none; display:inline-flex; align-items:center; gap:5px; }
  .back:hover { color:var(--fg); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <img src="../icon.png" alt="Sejud">
      <div class="titles">
        <h1>Configurações</h1>
        <span class="sub" id="ver">PJe Sejud Cariri</span>
      </div>
    </div>

    <div class="card">
      <h2><span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span> Filas finais de Citar/Intimar</h2>
      <p class="desc">O processo só será considerado <b>concluído</b> após a automação se estiver em uma destas filas. Marque as filas desejadas e/ou adicione outras abaixo.</p>

      <div class="fila-list" id="fila-list"></div>

      <div>
        <label class="field-label">Outras filas finais (uma por linha)</label>
        <textarea id="fila-custom" placeholder="Ex.: [Sec] - Expediente - AGUARDAR ENVIO PARA O DJEN"></textarea>
      </div>

      <div class="actions">
        <button class="btn-primary" id="btn-salvar">Salvar configurações</button>
        <button class="btn-ghost" id="btn-restaurar">Restaurar padrão</button>
        <span class="toast" id="toast">✓ Salvo!</span>
      </div>
    </div>

    <a class="back" href="#" id="back">← Voltar</a>
  </div>
  <script src="options.js"></script>
</body>
</html>
