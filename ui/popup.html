<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  :root { --bg:#fff; --fg:#0f172a; --muted:#64748b; --border:#e2e8f0; --accent:#1e3a5f; --accent2:#0f172a; --danger:#f59e0b; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { width:300px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  .header { display:flex; align-items:center; gap:11px; padding:14px 16px; background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#fff; }
  .header img { width:34px; height:34px; border-radius:7px; flex-shrink:0; box-shadow:0 1px 3px rgba(0,0,0,.25); }
  .header .titles { display:flex; flex-direction:column; gap:2px; min-width:0; }
  .header .name { font-size:14px; font-weight:700; line-height:1.1; }
  .header .ver { font-size:10.5px; opacity:.72; font-weight:500; }
  .body { padding:12px; display:flex; flex-direction:column; gap:10px; }
  /* Switch shadcn-style */
  .row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 12px; border:1px solid var(--border); border-radius:9px; background:#fff; transition:border-color .15s; }
  .row:hover { border-color:#cbd5e1; }
  .row .label { display:flex; flex-direction:column; gap:2px; min-width:0; }
  .row .label .t { font-size:12.5px; font-weight:600; color:var(--fg); }
  .row .label .s { font-size:10.5px; color:var(--muted); }
  .switch { position:relative; width:38px; height:22px; flex-shrink:0; }
  .switch input { opacity:0; width:0; height:0; }
  .slider { position:absolute; cursor:pointer; inset:0; background:#cbd5e1; border-radius:999px; transition:background .2s; }
  .slider::before { content:""; position:absolute; height:16px; width:16px; left:3px; top:3px; background:#fff; border-radius:50%; transition:transform .2s; box-shadow:0 1px 2px rgba(0,0,0,.2); }
  .switch input:checked + .slider { background:linear-gradient(135deg,#10b981,#059669); }
  .switch input:checked + .slider::before { transform:translateX(16px); }
  /* Nota de desenvolvimento */
  .note { display:flex; gap:9px; padding:10px 12px; border:1px solid #fde68a; background:#fffbeb; border-radius:9px; }
  .note .ico { flex-shrink:0; color:var(--danger); margin-top:1px; }
  .note .txt { font-size:11px; line-height:1.45; color:#92400e; }
  .note .txt b { color:#78350f; }
  /* Botão configurações */
  .btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:9px; background:#fff; color:var(--fg); font-family:inherit; font-size:12.5px; font-weight:600; cursor:pointer; transition:all .15s; }
  .btn:hover { border-color:#cbd5e1; background:#f8fafc; }
  .btn:active { background:#f1f5f9; }
  .footer { padding:8px 16px 12px; text-align:center; font-size:10px; color:var(--muted); border-top:1px solid var(--border); }
</style>
</head>
<body>
  <div class="header">
    <img id="ext-icon" src="../icon.png" alt="Sejud">
    <div class="titles">
      <span class="name">PJe Sejud Cariri</span>
      <span class="ver" id="ext-version">v—</span>
    </div>
  </div>
  <div class="body">
    <label class="row" for="toggle-enabled">
      <span class="label">
        <span class="t">Extensão habilitada</span>
        <span class="s" id="enabled-status">Ativa no PJe</span>
      </span>
      <span class="switch">
        <input type="checkbox" id="toggle-enabled">
        <span class="slider"></span>
      </span>
    </label>

    <div class="note">
      <span class="ico">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </span>
      <span class="txt"><b>Em fase de desenvolvimento.</b> Podem ocorrer falhas ou comportamentos inesperados durante o uso.</span>
    </div>

    <button class="btn" id="btn-config">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Configurações
    </button>
  </div>
  <div class="footer">Tribunal de Justiça do Ceará · Cariri</div>
  <script src="popup.js"></script>
</body>
</html>
